<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Arkham Divider</title>
  
  <style>
    :root {
      --paper-0: #f3ede0;
      --paper-1: #fbf7ee;
      --ink-0: #191614;
      --ink-1: rgba(25, 22, 20, 0.74);
      --brass: #8a6a1f;
      --brass-2: #b08a3c;
      --panel: rgba(255, 255, 255, 0.75);
      --stroke: rgba(138, 106, 31, 0.30);
      --shadow: rgba(12, 10, 8, 0.10);
    }

    html, body {
      height: 100%;
      min-height: 100vh;
    }

    body {
      margin: 0;
      background:
        radial-gradient(1200px 800px at 50% 30%, rgba(176, 138, 60, 0.14), transparent 60%),
        radial-gradient(900px 600px at 20% 85%, rgba(0, 0, 0, 0.06), transparent 55%),
        linear-gradient(180deg, var(--paper-1), var(--paper-0));
      color: var(--ink-1);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      height: 100vh;
      width: 100vw;
      padding: 24px;
    }

    .panel {
      width: min(520px, 100%);
      padding: 22px 18px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      box-shadow:
        0 14px 40px var(--shadow),
        0 0 0 1px rgba(255, 255, 255, 0.65) inset;
      backdrop-filter: blur(6px);
    }

    .title {
      margin: 0 0 14px;
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-0);
      font-size: 14px;
      opacity: 0.95;
    }

    .rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(138, 106, 31, 0.55), transparent);
      margin: 12px 0 18px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: var(--ink-1);
    }

    .icon {
      display: inline-block;
      height: 2em;
      width: 2em;
      color: var(--brass-2);
      animation: sigil-blink 2400ms ease-in-out infinite;
      will-change: opacity, filter;
    }

    @keyframes sigil-blink {
      0%, 100% {
        opacity: 0.55;
        filter: drop-shadow(0 2px 2px rgba(12, 10, 8, 0.14));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 8px 10px rgba(12, 10, 8, 0.12));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .icon {
        animation: none;
      }
    }

    .progress {
      margin-top: 14px;
      height: 6px;
      border-radius: 999px;
      background: rgba(25, 22, 20, 0.10);
      border: 1px solid rgba(138, 106, 31, 0.18);
      overflow: hidden;
    }

    .progress__bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      position: relative;
      overflow: hidden;
      background: linear-gradient(
        90deg,
        rgba(176, 138, 60, 0.30),
        rgba(176, 138, 60, 0.78)
      );
      animation: load-progress 12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
    }

    .progress__bar::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -35%;
      width: 35%;
      height: 200%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.55),
        transparent
      );
      transform: skewX(-18deg);
      opacity: 0.45;
      animation: sweep 2200ms linear infinite;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .progress__bar {
        animation: none;
        width: 45%;
      }

      .progress__bar::after {
        display: none;
      }
    }

    @keyframes load-progress {
      0% { width: 0%; }
      20% { width: 38%; }
      45% { width: 62%; }
      70% { width: 78%; }
      88% { width: 86%; }
      100% { width: 92%; }
    }

    @keyframes sweep {
      0% { left: -35%; }
      100% { left: 110%; }
    }

    .mirrors {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .mirror {
      color: var(--ink-0);
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(138, 106, 31, 0.35);
      background: linear-gradient(180deg, rgba(176, 138, 60, 0.16), rgba(255, 255, 255, 0));
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .mirror:hover {
      transform: translateY(-1px);
      border-color: rgba(176, 138, 60, 0.70);
      background: linear-gradient(180deg, rgba(176, 138, 60, 0.22), rgba(255, 255, 255, 0));
      box-shadow: 0 10px 18px rgba(12, 10, 8, 0.10);
    }

    .mirror:active {
      transform: translateY(0px);
    }

    .mirror:focus-visible {
      outline: 2px solid rgba(176, 138, 60, 0.85);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="panel">
      <h1 class="title">Arkham Divider</h1>
      <div class="rule"></div>
      <div class="loading">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 943 928" width="943" height="928" class="icon"><path fill="currentColor" d="M331.979,0.023c80.571,-1.332 155.959,50.764 187.93,130.289c20.646,176.85 -60.912,151.474 -103.316,198.238c77.012,-146.046 -68.153,-236.515 -126.145,-100.211c-6.31,86.246 42.961,112.735 87.543,154.211c87.358,34.794 115.798,119.092 122.664,183.766c-34.051,22.456 -66.852,48.573 -82.254,112.176c-47.274,-177.592 -130.643,-163.815 -215.449,-204.965c-192.486,-134.634 -84.481,-307.171 -40.777,-375.137c49.458,-67.974 111.011,-97.395 169.805,-98.367zM707.861,258.203c75.149,0.622 119.326,69.73 121.031,106.953c42.034,139.55 -112.548,237.949 -172.164,280.539c-62.352,-13.222 -134.494,27.743 -221.668,92.973l-0.004,0.004c-18.094,-114.36 139.924,-210.762 170.73,-228.902c55.298,-23.012 84.441,-54.376 93.527,-87.176c24.262,-81.186 -17.398,-63.054 -42.59,-70.102c-35.722,1.622 -57.806,23.704 -80.68,44.582c-5.938,-82.114 28.998,-99.698 61.66,-121.086c25.646,-12.767 49.114,-17.959 70.156,-17.785zM321.066,556.156c110.926,122.71 73.396,259.154 29.184,287.082l-93.855,-95.523c55.44,-81.374 -52.749,-159.454 -81.375,-174.484c-100.766,-53.306 -164.927,47.274 -118.719,138.996c-125.23,-108.203 -16.188,-221.84 110.73,-223.219c53.588,-0.583 110.361,18.846 154.035,67.148zM640.191,666.393c42.682,0.383 96.01,11.345 163.512,36.977c85.364,9.788 102.207,-6.683 139.367,-31.875c-2.738,28.626 -20.877,109.259 -224.359,79.707c-69.774,0 -135.557,-24.821 -209.695,78.125c-4,7.422 -11.784,9.602 -8.168,22.824c-1.814,8.912 -4.312,12.16 -8.496,16.328c-34.98,28.068 -36.607,40.414 -53.309,53.262c-4.122,4.3 -3.991,11.547 -13.223,0.133l-52.375,-53.816c-5.798,-9.044 -3.983,-21.193 2.367,-26.441l0.004,0.059c42.032,-59.292 105.496,-117.609 164.742,-148.785c24.914,-16.681 56.951,-26.878 99.633,-26.496z" /></svg>

        <span data-i18n="loading">Loading...</span>
      </div>
      <div class="progress" aria-hidden="true">
        <div class="progress__bar"></div>
      </div>
      <div class="mirrors">
        <a class="mirror" href="https://global.arkham-divider.com">
          🌍 <span data-i18n="global">Global</span>
        </a>
        <a class="mirror" href="https://fallback.arkham-divider.com">
          🪩 <span data-i18n="mirror">Mirror</span>
        </a>
      </div>
    </div>
  </div>
  <script>
    (() => {
      const host = "arkham-divider.com";
      const follow = (url) => (window.location.href = url);

      const queryString = window.location.search;
      const hash = window.location.hash;

      const getTargetUrl = (type) =>
        `https://${type}.${host}${queryString}${hash}`;

      const getLoaderUrl = (baseUrl) => `${baseUrl}/images/loader.gif`;

      const isRu = () => {
        const langs = navigator.languages?.length
          ? navigator.languages
          : [navigator.language].filter(Boolean);
        return langs.some((l) => String(l).toLowerCase().startsWith("ru"));
      };

      const applyI18n = () => {
        const translations = {
          en: {
            languageLabel: "Language",
            loading: "Loading…",
            global: "Global",
            mirror: "Mirror",
          },
          ru: {
            languageLabel: "Язык",
            loading: "Загрузка…",
            global: "Global",
            mirror: "Зеркало (Россия)",
          },
          fr: {
            languageLabel: "Langue",
            loading: "Chargement…",
            global: "Global",
            mirror: "Miroir",
          },
          de: {
            languageLabel: "Sprache",
            loading: "Wird geladen…",
            global: "Global",
            mirror: "Spiegel",
          },
          es: {
            languageLabel: "Idioma",
            loading: "Cargando…",
            global: "Global",
            mirror: "Espejo",
          },
          it: {
            languageLabel: "Lingua",
            loading: "Caricamento…",
            global: "Globale",
            mirror: "Mirror",
          },
          pl: {
            languageLabel: "Język",
            loading: "Ładowanie…",
            global: "Globalnie",
            mirror: "Mirror",
          },
          ko: {
            languageLabel: "언어",
            loading: "로딩 중…",
            global: "Global",
            mirror: "미러",
          },
        };

        const normalizeLang = (lang) => {
          if (!lang) return "en";
          const lower = String(lang).toLowerCase();
          const base = lower.split("-")[0];
          return Object.prototype.hasOwnProperty.call(translations, base)
            ? base
            : "en";
        };

        const getInitialLang = () => {
          const langs = navigator.languages?.length
            ? navigator.languages
            : [navigator.language].filter(Boolean);

          for (const l of langs) {
            const normalized = normalizeLang(l);
            if (normalized !== "en") return normalized;
          }
          return "en";
        };

        const lang = getInitialLang();
        const dict = translations[lang] ?? translations.en;
        document.documentElement.lang = lang;

        for (const el of document.querySelectorAll("[data-i18n]")) {
          const key = el.getAttribute("data-i18n");
          if (!key) continue;
          const value = dict[key] ?? translations.en[key];
          if (value) el.textContent = value;
        }
      };

      const updateMirrorLinks = () => {
        for (const link of document.querySelectorAll(".mirror")) {
          const baseUrl = link.getAttribute("href");
          if (!baseUrl) continue;
          link.setAttribute("href", `${baseUrl}${queryString}${hash}`);
        }
      };

      const probe = async (type, timeoutMs = 1200) => {
        const baseUrl = `https://${type}.${host}`;
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        const url = getTargetUrl(type);

        try {
          // mode:'no-cors' lets us cheaply probe reachability without needing CORS.
          await fetch(`${getLoaderUrl(baseUrl)}?t=${Date.now()}`, {
            signal: controller.signal,
            cache: "no-store",
            mode: "no-cors",
          });
          return { type, url };
        } finally {
          clearTimeout(timer);
        }
      };

      const pick = async () => {
        try {
          // If the user's language is Russian, prefer fallback unless global is clearly reachable fast.
          const ruBias = isRu();
          const globalTimeout = ruBias ? 800 : 1200;
          const fallbackTimeout = 1200;
          return await Promise.any([
            probe("global", globalTimeout),
            probe("fallback", fallbackTimeout),
          ]);
        } catch {
          return { type: "fallback", url: getTargetUrl("fallback") };
        }
      };

      const init = async () => {
        applyI18n();
        updateMirrorLinks();
        const chosen = await pick();
        follow(chosen.url);
      };

      init();
    })();
  </script>
</body>
</html>
